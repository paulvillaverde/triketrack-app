<!DOCTYPE html>
<html lang="%LANG_ISO_CODE%">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>%WEB_TITLE%</title>
    <meta name="application-name" content="TrikeTrack Driver" />
    <meta
      name="description"
      content="TrikeTrack Driver helps drivers track trips, rebuild matched routes, and review trip history."
    />
    <meta name="theme-color" content="#57C7A8" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="TrikeTrack" />
    <link rel="manifest" href="./manifest.json" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <style id="expo-reset">
      html,
      body {
        height: 100%;
      }

      body {
        overflow: hidden;
        background: #f5f6f8;
      }

      #root {
        display: flex;
        height: 100%;
        flex: 1;
      }
    </style>
  </head>

  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('./sw.js').catch(function (error) {
            console.warn('Service worker registration failed.', error);
          });
        });
      }
    </script>
  </body>
</html>
